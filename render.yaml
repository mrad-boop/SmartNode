services:
  - type: web
    name: smartnode
    runtime: static
    buildCommand: node build.js
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: APP_NAME
        value: SmartNode
      - key: APP_TITLE
        value: SmartNode — DeFi Matrix
      - key: SYSTEM_FEE_ADDRESS
        sync: false        # set manually in Render dashboard (your real wallet)
      - key: SYSTEM_FEE_AMOUNT
        value: "10"
      - key: LEVEL_AMOUNT
        value: "10"
      - key: MATRIX_L1
        value: Admin_Node
      - key: MATRIX_L2
        value: System_Link
      - key: MATRIX_L3
        value: Global_Alpha
      - key: MATRIX_L4
        value: DeFi_Master
      - key: MATRIX_L5
        value: Prime_Core
      - key: MATRIX_L6
        value: Support_Level
      - key: WALLET_L1
        sync: false        # set manually — real Solana address for Admin_Node
      - key: WALLET_L2
        sync: false        # set manually — real Solana address for System_Link
      - key: WALLET_L3
        sync: false        # set manually — real Solana address for Global_Alpha
      - key: WALLET_L4
        sync: false        # set manually — real Solana address for DeFi_Master
      - key: WALLET_L5
        sync: false        # set manually — real Solana address for Prime_Core
      - key: WALLET_L6
        sync: false        # set manually — real Solana address for Support_Level
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
