services:
  - type: web
    name: smartnode
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false          # ← set your secret admin password in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: smartnode-db
          property: connectionString
      - key: APP_NAME
        value: SmartNode
      - key: APP_TITLE
        value: SmartNode — DeFi Matrix
      - key: SYSTEM_FEE_ADDRESS
        sync: false          # ← paste your real Solana wallet in Render dashboard
      - key: SYSTEM_FEE_AMOUNT
        value: "10"
      - key: LEVEL_AMOUNT
        value: "5"
      - key: MATRIX_L1
        value: Admin_Node
      - key: MATRIX_L2
        value: System_Link
      - key: MATRIX_L3
        value: Global_Alpha
      - key: MATRIX_L4
        value: DeFi_Master
      - key: MATRIX_L5
        value: Prime_Core
      - key: MATRIX_L6
        value: Support_Level
      - key: WALLET_L1
        sync: false          # ← real Solana address for Admin_Node
      - key: WALLET_L2
        sync: false
      - key: WALLET_L3
        sync: false
      - key: WALLET_L4
        sync: false
      - key: WALLET_L5
        sync: false
      - key: WALLET_L6
        sync: false

databases:
  - name: smartnode-db
    databaseName: smartnode
    user: smartnode
    plan: free
